@if (service.hasActiveGame()) {
  <div
    class="w-full max-w-sm border-2 border-primary-500 bg-primary-500/10 p-4 relative overflow-hidden animate-in fade-in zoom-in duration-300"
  >
    <div
      class="absolute inset-0 bg-[repeating-linear-gradient(90deg,transparent,transparent_2px,rgba(var(--primary-rgb),0.03)_2px,rgba(var(--primary-rgb),0.03)_4px)] pointer-events-none"
    ></div>

    <div class="flex flex-col gap-4 relative z-10 text-center">
      <div class="flex items-center justify-center gap-3">
        <i class="pi pi-exclamation-triangle text-primary-400 animate-pulse text-xl"></i>
        <span class="font-mono font-black text-primary-400 tracking-[0.2em] uppercase text-sm">
          Sessione_Attiva_Rilevata
        </span>
      </div>

      <div class="h-[1px] w-full bg-primary-500/30"></div>

      <div class="flex flex-col gap-2">
        <p-button
          label="[ RIPRISTINA_SESSIONE ]"
          icon="pi pi-history"
          [routerLink]="service.getResumeRoute()"
          class="w-full py-3 bg-primary-500 border-none text-slate-950 font-bold tracking-widest rounded-none hover:bg-primary-400 transition-all shadow-[0_0_15px_rgba(var(--primary-rgb),0.3)]"
        />

        <p-button
          label="ABORT_PROCESS"
          icon="pi pi-trash"
          (onClick)="service.reset()"
          class="w-full py-2 bg-transparent border border-red-900 text-red-900 font-mono text-[10px] tracking-[0.3em] rounded-none hover:bg-red-900/10 hover:border-red-500 hover:text-red-500 transition-all uppercase"
        />
      </div>

      <p class="text-[8px] text-primary-700 uppercase tracking-widest italic opacity-60">
        Buffer: {{ service.currentPhase() }} // ID: 0x{{ service.players().length }}FF
      </p>
    </div>

    <div class="absolute top-0 left-0 w-2 h-2 border-t border-l border-primary-500"></div>
    <div class="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-primary-500"></div>
  </div>
}
