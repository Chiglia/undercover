<nav class="border-b border-primary-500/20 bg-slate-950/80 backdrop-blur-md relative">
  <div
    class="pointer-events-none absolute inset-0 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.05)_50%)] bg-[length:100%_4px]"
  ></div>

  <p-menubar
    [model]="items"
    class="bg-transparent border-none px-4 py-1"
    [pt]="{
      root: { class: 'bg-transparent border-none' },
      button: {
        class:
          'border-2 border-primary-500/50 bg-primary-500/5 text-primary-400 w-10 h-10 rounded-none hover:bg-primary-500 hover:text-slate-950 transition-all',
      },
      rootList: {
        class: 'bg-slate-950 border-2 border-primary-500/50 p-2 mt-2 shadow-[0_0_25px_black]',
      },
    }"
  >
    <ng-template #start>
      <div class="flex items-center gap-2">
        <div
          class="w-1.5 h-5 bg-primary-500 animate-pulse shadow-[0_0_8px_rgba(var(--primary-rgb),0.6)]"
        ></div>
        <span class="font-mono font-black text-primary-400 text-sm tracking-tighter uppercase"
          >UC-OS_v2.1</span
        >
      </div>
    </ng-template>

    <ng-template #item let-item>
      <a
        [routerLink]="item.routerLink"
        class="flex items-center px-4 py-2 font-mono text-[11px] uppercase tracking-[0.2em] text-primary-600 hover:text-primary-400 transition-colors group relative"
      >
        <i [class]="item.icon" class="mr-2"></i>
        <span>{{ item.label }}</span>
        <span
          class="absolute bottom-0 left-4 right-4 h-[1px] bg-primary-500 scale-x-0 group-hover:scale-x-100 transition-transform origin-left"
        ></span>
      </a>
    </ng-template>
  </p-menubar>
</nav>
