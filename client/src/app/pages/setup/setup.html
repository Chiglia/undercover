<div class="flex flex-col gap-4 p-4 h-screen justify-center max-w-md mx-auto">
  <p-card header="Nuova Partita">
    <div class="flex flex-col gap-3">
      <div class="flex gap-2">
        <input
          pInputText
          [(ngModel)]="newName"
          placeholder="Nome giocatore"
          class="flex-1"
          (keyup.enter)="add()"
        />
        <p-button icon="pi pi-plus" (onClick)="add()" [disabled]="!newName()" />
      </div>
      <div class="flex flex-wrap gap-2 py-2">
        @for (p of names(); track $index) {
          <span class="px-3 py-1 bg-blue-100 rounded-full flex items-center gap-2">
            {{ p }} <i class="pi pi-times text-xs cursor-pointer" (click)="remove($index)"></i>
          </span>
        }
      </div>
      <p-button label="Inizia" class="w-full" (onClick)="start()" [disabled]="names().length < 3" />
    </div>
  </p-card>
</div>
